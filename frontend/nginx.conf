upstream api_backend {
    server api:3000;
    keepalive 32;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Manter ligações do cliente abertas durante 75 segundos
    keepalive_timeout 75s;
    keepalive_requests 1000;

    root /usr/share/nginx/html;
    index index.html;

    location = /api/docs {
        return 302 https://$http_host/api/docs/;
    }

    # compatibilidade temporária para bundles antigos que ainda chamem /api/api/*
    location ^~ /api/api/ {
        rewrite ^/api/api/(.*)$ /api/$1 break;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 4545;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_redirect off;
    }

    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 4545;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_redirect off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
