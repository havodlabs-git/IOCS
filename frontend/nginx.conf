server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy reverso: /api/* → backend (container "api" na rede iocs-net, porta interna 3000)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necessário para o Chrome não bloquear pedidos de origem pública para rede privada
        add_header Access-Control-Allow-Private-Network true always;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Admin-Key" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # SPA fallback: todas as rotas servem o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
